version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: euatendo-postgres
    environment:
      POSTGRES_USER: euatendo
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: euatendo_development
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U euatendo"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
